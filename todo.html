<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <header>
    <div class="logo"><a href="index.html">AlexMorgan.dev</a></div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="todo.html" aria-current="page">Task App</a></li>
      </ul>
    </nav>
  </header>

  <main id="main-content">
    <h1>Task Management Application</h1>
    <p>Create, manage, and filter your daily tasks efficiently. Your data saves automatically to your browser.</p>

    <section class="todo-container">
    
      <form id="todo-form" aria-label="Create a new task">
        <div class="form-group">
          <label id="task-input-label" for="task-input">What needs to be done?</label>
          <div class="input-actions-group">
            <input 
              type="text" 
              id="task-input" 
              required 
              autocomplete="off" 
              placeholder="e.g., Review WCAG compliance guidelines"
              aria-describedby="task-input-label"
            >
            <button type="submit" id="add-task-btn">Add Task</button>
          </div>
        </div>
      </form>

      <div class="filter-controls" role="group" aria-label="Filter tasks">
        <button type="button" class="filter-btn active" data-filter="all">All</button>
        <button type="button" class="filter-btn" data-filter="active">Active</button>
        <button type="button" class="filter-btn" data-filter="completed">Completed</button>
      </div>

      <div id="list-status" class="sr-only" aria-live="polite"></div>

      <ul id="todo-list" aria-label="Current tasks list">
      </ul>

    </section>
  </main>

  <footer>

  <script src="js/app.js"></script>
</body>
